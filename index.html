<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="bootstrap/css/bootstrap.css">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>

    <header>
        <nav class="navbar fixed-top">
            <div class="container">
              <a class="navbar-brand" href="#">
                <img src="anason-22-8-2023.png" alt="logo" width="150" height="40">
              </a>
              <button class="btn btn-sm btn-warning" onclick="addUser()">Aggiungi prodotto</button>
            </div>
          </nav>
    </header>

    <main class="container">
      <div class="container d-flex justify-content-between">
        <h2>Catalogo</h2>
        <form class="d-flex" role="search">
          <input id="searchInputHome" class="my-search form-control me-2" type="search" placeholder="Cerca per brand" aria-label="Search">
          <button class="my-btn btn btn-outline-dark" type="submit"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-search" viewBox="0 0 16 16">
            <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001c.03.04.062.078.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1.007 1.007 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0z"/>
          </svg></button>
        </form>

      </div>
        <div class="container mt-3">

          
            <div id="products-container" class="row row-cols-1 row-cols-md-2 g-4">

            </div>
        </div>
    </main>

    <div id="spinner-container" class="d-flex justify-content-center d-none">
      <div class="spinner-border text-warning" role="status">
          <span class="visually-hidden">Loading...</span>
      </div>
    </div>

    <footer class="footer mt-auto py-3 bg-light">
      <div class="container">
        <span class="text-muted">Anason shoes company</span>
      </div>
    </footer>
    




    <script src="bootstrap/js/bootstrap.bundle.js"></script>
    <script src="main.js"></script>
</body>
</html>
